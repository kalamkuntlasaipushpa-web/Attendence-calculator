<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Attendance Calculator</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
      background-color: #f4f4f4;
    }
    h1, h2 {
      text-align: center;
    }
    .container {
      max-width: 700px;
      margin: auto;
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    .month-container {
      background: #eef;
      padding: 10px;
      margin: 10px 0;
      border-radius: 5px;
    }
    .good {
      color: green;
      font-weight: bold;
    }
    .low {
      color: red;
      font-weight: bold;
    }
    label {
      margin-right: 10px;
    }
    button {
      margin-top: 10px;
      padding: 8px 15px;
      border: none;
      border-radius: 5px;
      background: #007bff;
      color: white;
      cursor: pointer;
    }
    button:hover {
      background: #0056b3;
    }
    select, input[type=checkbox] {
      margin-right: 10px;
    }
    ul {
      list-style-type: none;
      padding-left: 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Attendance Calculator</h1>

    <div>
      <label for="monthSelect">Select Month:</label>
      <select id="monthSelect">
        <option value="">--Select Month--</option>
        <option value="January">January</option>
        <option value="February">February</option>
        <option value="March">March</option>
        <option value="April">April</option>
        <option value="May">May</option>
        <option value="June">June</option>
        <option value="July">July</option>
        <option value="August">August</option>
        <option value="September">September</option>
        <option value="October">October</option>
        <option value="November">November</option>
        <option value="December">December</option>
      </select>
    </div>

    <div style="margin-top:10px;">
      <label><input type="checkbox" id="morningPresent"> Morning Present (4 classes)</label>
      <label><input type="checkbox" id="afternoonPresent"> Afternoon Present (3 classes)</label>
    </div>

    <button onclick="addDailyAttendance()">Add Attendance</button>
    <button onclick="resetMonth()">Reset Month</button>

    <h2>Month Summary</h2>
    <div id="monthData"></div>

    <h2>Attendance History</h2>
    <div id="attendanceHistory"></div>
  </div>

  <script>
    let attendanceData = JSON.parse(localStorage.getItem("attendanceData")) || {};

    // Save to localStorage
    function saveData() {
      localStorage.setItem("attendanceData", JSON.stringify(attendanceData));
    }

    function addDailyAttendance() {
      const month = document.getElementById("monthSelect").value;
      if (!month) {
        alert("Select a month!");
        return;
      }

      const morningPresent = document.getElementById("morningPresent").checked ? 4 : 0;
      const afternoonPresent = document.getElementById("afternoonPresent").checked ? 3 : 0;
      const totalClassesToday = 7;

      const today = new Date();
      const options = { weekday: 'long', day: '2-digit', month: 'short', year: 'numeric' };
      const dateStr = today.toLocaleDateString('en-GB', options);

      if (!attendanceData[month]) {
        attendanceData[month] = { present: 0, total: 0, dailyLogs: [] };
      }

      // Prevent duplicate entry for same day
      const alreadyMarked = attendanceData[month].dailyLogs.some(log => log.date === dateStr);
      if (alreadyMarked) {
        alert("Attendance already marked for today!");
        return;
      }

      attendanceData[month].present += morningPresent + afternoonPresent;
      attendanceData[month].total += totalClassesToday;

      attendanceData[month].dailyLogs.push({
        date: dateStr,
        morning: morningPresent ? "Present" : "Absent",
        afternoon: afternoonPresent ? "Present" : "Absent"
      });

      document.getElementById("morningPresent").checked = false;
      document.getElementById("afternoonPresent").checked = false;

      saveData();
      renderMonthData();
      renderHistory();
    }

    function resetMonth() {
      const month = document.getElementById("monthSelect").value;

      if (month && attendanceData[month]) {
        if (confirm("Are you sure you want to reset this month?")) {
          attendanceData[month] = { present: 0, total: 0, dailyLogs: [] };
          saveData();
          renderMonthData();
          renderHistory();
        }
      }
    }

    function renderMonthData() {
      const container = document.getElementById("monthData");
      container.innerHTML = "";

      Object.keys(attendanceData).forEach(month => {
        const data = attendanceData[month];

        const percent = data.total > 0
          ? ((data.present / data.total) * 100).toFixed(2)
          : 0;

        const colorClass = percent >= 75 ? "good" : "low";

        const div = document.createElement("div");
        div.className = "month-container";
        div.innerHTML = `
          <h3>${month}</h3>
          Present Classes: ${data.present} <br>
          Total Classes: ${data.total} <br>
          Attendance %: <b class="${colorClass}">${percent}%</b>
        `;

        container.appendChild(div);
      });
    }

    function renderHistory() {
      const historyContainer = document.getElementById("attendanceHistory");
      historyContainer.innerHTML = "";

      Object.keys(attendanceData).forEach(month => {
        const monthDiv = document.createElement("div");
        monthDiv.className = "month-container";

        let html = `<h3>${month}</h3><ul>`;

        attendanceData[month].dailyLogs.forEach(log => {
          const morningClass = log.morning === "Absent" ? "low" : "good";
          const afternoonClass = log.afternoon === "Absent" ? "low" : "good";

          html += `
            <li>
              ${log.date} → 
              Morning: <span class="${morningClass}">${log.morning}</span>, 
              Afternoon: <span class="${afternoonClass}">${log.afternoon}</span>
            </li>
          `;
        });

        html += "</ul>";
        monthDiv.innerHTML = html;
        historyContainer.appendChild(monthDiv);
      });
    }

    // Load data on page open
    window.onload = function () {
      renderMonthData();
      renderHistory();
    };
  </script>
<html>
<head>
  <title>Attendance Calculator</title>
</head>

<body style="text-align:center; font-family:Arial; background:#f2f2f2;">

<h1 style="background:purple; color:white; padding:20px;">
📊 Attendance Calculator
</h1>

<input type="number" id="present" placeholder="Present Days"><br><br>
<input type="number" id="total" placeholder="Total Classes"><br><br>

<button onclick="calculate()">Check</button>

<h2 id="result"></h2>

<script>
function calculate() {
  var present = document.getElementById("present").value;
  var total = document.getElementById("total").value;

  var percentage = (present / total) * 100;

  if (percentage >= 75) {
    document.getElementById("result").innerHTML =
      "😎 Safe to Bunk! " + percentage.toFixed(2) + "%";
  } else {
    document.getElementById("result").innerHTML =
      "🚨 Danger Zone! " + percentage.toFixed(2) + "%";
  }
}
</script>

</body>
</html>
</body>
</html>
